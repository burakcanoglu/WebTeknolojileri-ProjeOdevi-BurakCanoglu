    <div id="app" class="container mt-5 mb-5">

            <div class="card-header bg-dark text-white p-3">
                <h3 class="mb-0">İletişim Formu</h3>
            </div>
            <div class="card-body p-4">
                <form id="contactForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label font-weight-bold">Adınız</label>
                            <input type="text" v-model="formData.name" id="name" class="form-control" placeholder="Adınız">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Soyadınız</label>
                            <input type="text" v-model="formData.surname" id="surname" class="form-control" placeholder="Soyadınız">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">E-posta</label>
                            <input type="email" v-model="formData.email" id="email" class="form-control" placeholder="mail@ornek.com">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Doğum Tarihi</label>
                            <input type="date" v-model="formData.birth" id="birth" class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Şehir</label>
                            <select v-model="formData.city" id="city" class="form-select">
                                <option value="">Şehir Seçiniz</option>
                                <option value="Sakarya">Sakarya</option>
                                <option value="Istanbul">İstanbul</option>
                                <option value="Ankara">Ankara</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label d-block">Cinsiyet</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" v-model="formData.gender" name="gender" value="Erkek">
                                <label class="form-check-label">Erkek</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" v-model="formData.gender" name="gender" value="Kadin">
                                <label class="form-check-label">Kadın</label>
                            </div>
                        </div>

                        <div class="col-md-12 mb-3">
                            <label class="form-label d-block">İlgi Duyduğunuz Alanlar</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" v-model="formData.interests" value="Spor">
                                <label class="form-check-label">Spor</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" v-model="formData.interests" value="Müzik">
                                <label class="form-check-label">Müzik</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" v-model="formData.interests" value="Teknoloji">
                                <label class="form-check-label">Teknoloji</label>
                            </div>
                        </div>

                        <div class="col-md-12 mb-3">
                            <label class="form-label">Dosya Eki (Opsiyonel)</label>
                            <input type="file" class="form-control">
                        </div>

                        <div class="col-12 mb-4">

                    <div class="row text-center">
                        <div class="col-md-6 mb-2">
                            <button type="button" onclick="validateVanilaJS()" class="btn btn-primary w-100">
                                Vanila JS ile Denetle
                            </button>
                        </div>
                        <div class="col-md-6 mb-2">
                            <button type="button" @click="validateVueJS" class="btn btn-success w-100">
                                Vue.js ile Denetle
                            </button>
                        </div>
                        <div class="col-12">
                            <button type="reset" class="btn btn-outline-secondary w-50">Temizle</button>
                        </div>

    <script>
        // --- 1.  JS DENETLEME (Düz JavaScript) ---
        function validateVanilaJS() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const city = document.getElementById('city').value;
            const message = document.getElementById('message').value;

            if (name === "" || email === "" || city === "" || message === "") {
                alert("VANILA JS: Eksik alanlar var! Lütfen formu kontrol edin.");
            } else {
                alert("VANILA JS: Form başarıyla doğrulandı!");
            }
        }

        // --- 2. VUE.JS FRAMEWORK DENETLEME ---
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    formData: {
                        name: '',
                        surname: '',
                        email: '',
                        birth: '',
                        city: '',
                        gender: '',
                        interests: [],
                        message: ''
                    }
                }
            },
            methods: {
                validateVueJS() {
                    const d = this.formData;
                    if (!d.name || !d.email || !d.city || d.interests.length === 0) {
                        alert("VUE.JS: Lütfen en az bir ilgi alanı seçin ve zorunlu alanları doldurun!");
                    } else {
                        alert(`VUE.JS: Tebrikler ${d.name}, framework ile denetleme başarılı!`);
                    }
                }
            }
        }).mount('#app');
    </script>
